name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dataframe,sqs,dynamodb,sklearn,s3-async]"
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=jsonflat --cov-report=term-missing --cov-fail-under=85

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and tools
        run: |
          pip install -e ".[dataframe,sqs,dynamodb,sklearn]"
          pip install ruff mypy==1.20.2 pandas-stubs boto3-stubs types-aioboto3 scikit-learn-stubs types-orjson

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (strict)
        run: mypy --strict jsonflat/
